# frozen_string_literal: true

# Solid Queue recurring jobs configuration
#
# ScheduledScanJob runs hourly to check which pages need scanning.
# Free plan shops scan daily; Monitor plan shops scan every 6 hours.
# The per-shop interval is determined by BillingPlanService.

scheduled_scan:
  class: ScheduledScanJob
  schedule: every hour
  description: "Queue scans for monitored product pages based on plan intervals"
